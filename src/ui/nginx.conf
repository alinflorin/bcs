server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  # ---- Brotli ----
  brotli on;
  brotli_static on;
  brotli_comp_level 6;
  brotli_types
    text/plain text/css application/javascript application/json
    application/xml text/xml text/javascript image/svg+xml font/ttf font/otf font/woff;

  # ---- Gzip ----
  gzip on;
  gzip_static on;
  gzip_proxied any;
  gzip_types
    text/plain text/css application/javascript application/json
    application/xml text/xml text/javascript image/svg+xml font/ttf font/otf font/woff;
  gzip_vary on;
  gzip_min_length 1024;

  # ---- Main route for SPA ----
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ---- Caching for static assets ----
  location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|ttf|svg|eot|otf|webp|json|mp4|webm|br|gz)$ {
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
    expires 1y;
  }

  # ---- Fallback 404 -> index.html (for SPA routes) ----
  error_page 404 /index.html;

  # ---- Optional: security headers ----
  add_header X-Content-Type-Options nosniff;
  add_header X-Frame-Options DENY;
  add_header X-XSS-Protection "1; mode=block";
}
