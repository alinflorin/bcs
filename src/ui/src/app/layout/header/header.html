<mat-toolbar color="primary">
  <button routerLink="/" matIconButton>
    <mat-icon>home</mat-icon>
  </button>
  <span class="cp" routerLink="/">BCS</span>
  <span class="spacer"></span>
  <button [matMenuTriggerFor]="menu" matIconButton>
    @if (!user) {
    <mat-icon>more_vert</mat-icon>
    } @else {
    <mat-icon><img loading="lazy" style="border-radius: 50%;" [src]="user.picture" /></mat-icon>
    }
  </button>
  <mat-menu #menu="matMenu">
    @if (user) {
    <button routerLink="/settings" mat-menu-item>
      <div id="user-details">
        <span class="wbba">{{ user.email }} {{ user.isAdmin ? '(admin)' : '' }}</span>
      </div>
    </button>
    <mat-divider></mat-divider>
    }
    <button mat-menu-item [matMenuTriggerFor]="languageMenu">
      <mat-icon>language</mat-icon>{{ "ui.layout.header.language" | translate }}
    </button>
    <button mat-menu-item [matMenuTriggerFor]="themeMenu">
      <mat-icon>palette</mat-icon>{{ "ui.layout.header.theme" | translate }}
    </button>
    <button routerLink="/about" mat-menu-item>
      <mat-icon>info</mat-icon>{{ "ui.layout.header.about" | translate }}
    </button>
    @if (user) {
    <button routerLink="/settings" mat-menu-item>
      <mat-icon>settings</mat-icon>{{ "ui.layout.header.settings" | translate }}
    </button>
    <button (click)="onLogoutClicked.emit()" mat-menu-item>
      <mat-icon>logout</mat-icon>{{ "ui.layout.header.logout" | translate }}
    </button>
    } @else {
    <button (click)="onLoginClicked.emit()" mat-menu-item>
      <mat-icon>login</mat-icon>{{ "ui.layout.header.login" | translate }}
    </button>
    }
  </mat-menu>
  <mat-menu #languageMenu="matMenu">
    @for (l of allLanguages; track l.code) {
    <button (click)="onLanguageChanged.emit(l.code)" mat-menu-item>
      @if(translate.currentLang === l.code) {
      <mat-icon>check</mat-icon>
      } @else {
      <mat-icon></mat-icon>
      }
      <mat-icon><img [src]="'/images/' + l.code + '.svg'" /></mat-icon><span>{{ l.name }}</span>
    </button>
    }
  </mat-menu>
  <mat-menu #themeMenu="matMenu">
    <button (click)="onThemeChanged.emit('auto')" mat-menu-item>
      @if(theme === 'auto') {
      <mat-icon>check</mat-icon>
      } @else {
      <mat-icon></mat-icon>
      }
      <mat-icon>brightness_auto</mat-icon><span>{{ "ui.layout.header.themes.auto" | translate }}</span>
    </button>
    <button (click)="onThemeChanged.emit('light')" mat-menu-item>
      @if(theme === 'light') {
      <mat-icon>check</mat-icon>
      } @else {
      <mat-icon></mat-icon>
      }
      <mat-icon>light_mode</mat-icon><span>{{ "ui.layout.header.themes.light" | translate }}</span>
    </button>
    <button (click)="onThemeChanged.emit('dark')" mat-menu-item>
      @if(theme === 'dark') {
      <mat-icon>check</mat-icon>
      } @else {
      <mat-icon></mat-icon>
      }
      <mat-icon>dark_mode</mat-icon><span>{{ "ui.layout.header.themes.dark" | translate }}</span>
    </button>
  </mat-menu>
</mat-toolbar>
