<div id="wrapper">
  <app-header
    (onLanguageChanged)="changeLanguage($event)"
    (onLoginClicked)="login()"
    (onLogoutClicked)="logout()"
    [user]="user()"
    [theme]="theme()"
    (onThemeChanged)="changeTheme($event)"
  ></app-header>
  <div id="content">
    <router-outlet />
  </div>
  <app-footer [apiVersion]="apiVersion()?.version || '?'"></app-footer>
</div>
