dex:
  ingress:
    hosts:
      - host: idp.bcs-uat.internal.huna2.com
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - secretName: dex-ingress-tls
        hosts:
          - idp.bcs-uat.internal.huna2.com
  config:
    issuer: https://idp.bcs-uat.internal.huna2.com
    connectors:
      - type: google
        id: google
        name: Google
        config:
          clientID: ${GOOGLE_CLIENT_ID}
          clientSecret: ${GOOGLE_CLIENT_SECRET}
          redirectURI: https://idp.bcs-uat.internal.huna2.com/callback
    staticClients:
      - id: bcs
        public: true
        name: 'bcs'
        redirectURIs:
        - 'https://bcs-uat.internal.huna2.com'